version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Node version:"
      - node -v
      - npm ci --legacy-peer-deps

  pre_build:
    commands:
      - echo "Downloading build input from S3"
      - test -n "$BUILD_INPUT_S3_KEY"
      - aws s3 cp "s3://$S3_BUCKET/$BUILD_INPUT_S3_KEY" build-input.json
      - echo "Applying listGuid + Form.io schema"
      - node scripts/apply-build-inputs.js --input build-input.json
      - echo "Generating SPFx schema bindings"
      - node scripts/generate-form-schema.js --input public/formio.json --meta public/form-meta.json

  build:
    commands:
      - echo "Building SPFx package"
      - export NODE_OPTIONS=--max_old_space_size=4096
      - npx gulp clean
      - npx gulp bundle --ship
      - npx gulp package-solution --ship

  post_build:
    commands:
      - echo "Verifying output"
      - test -f sharepoint/solution/$OUTPUT_SPPKG_NAME

      - echo "Uploading .sppkg to S3"
      - aws s3 cp sharepoint/solution/$OUTPUT_SPPKG_NAME s3://$S3_BUCKET/$BUILD_PREFIX/output/$OUTPUT_SPPKG_NAME

      - echo "Build completed successfully"