<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kk-sp-product-form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.form.io/formiojs/formio.full.min.css">
    <style>
        body {
            margin: 0;
            padding: 24px 32px;
            background: #ececec;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .form-wrapper {
            max-width: 1024px;
            margin: 0 auto;
            background: transparent;
            border: 0;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }

        .form-title {
            margin: 0 0 18px;
            font-size: 46px;
            line-height: 1.1;
            font-weight: 600;
            text-align: center;
            color: #111827;
        }

        /* Match app style closer than default Form.io theme */
        .formio-component+.formio-component {
            margin-top: 0.85rem;
        }

        .formio-component-label {
            margin-bottom: 0.25rem;
            color: #4b5563;
            font-size: 12px;
            font-weight: 500;
        }

        .form-control {
            min-height: 42px;
            border: 1px solid #d7d7d7;
            border-radius: 2px;
            box-shadow: none !important;
        }

        .btn-primary,
        .btn.btn-primary {
            background-color: #25bfb4 !important;
            border-color: #25bfb4 !important;
            color: #fff !important;
            min-width: 180px;
        }

        .formio-errors,
        .alert-danger {
            display: none !important;
        }
    </style>
    <style id="glozic-export-css">

    </style>
</head>

<body>
    <div class="form-wrapper">
        <h1 class="form-title">kk-sp-product-form</h1>
        <div id="glozic-form"></div>
    </div>
    <script src="https://cdn.form.io/formiojs/formio.full.min.js"></script>
    <script>
        const sourceSchema = { "display": "form", "components": [{ "label": "Title", "labelPosition": "top", "placeholder": "", "description": "", "tooltip": "", "prefix": "", "suffix": "", "widget": { "type": "input" }, "inputMask": "", "allowMultipleMasks": false, "customClass": "", "tabindex": "", "hidden": false, "hideLabel": false, "showWordCount": false, "showCharCount": false, "mask": false, "autofocus": false, "spellcheck": true, "disabled": false, "tableView": true, "modalEdit": false, "multiple": false, "persistent": true, "inputFormat": "plain", "protected": false, "dbIndex": false, "case": "", "encrypted": false, "redrawOn": "", "clearOnHide": true, "customDefaultValue": "", "calculateValue": "", "calculateServer": false, "allowCalculateOverride": false, "validateOn": "change", "validate": { "required": false, "pattern": "", "customMessage": "", "custom": "", "customPrivate": false, "json": "", "minLength": "", "maxLength": "", "strictDateValidation": false, "multiple": false, "unique": false }, "unique": false, "errorLabel": "", "key": "title", "tags": [], "properties": {}, "conditional": { "show": null, "when": null, "eq": "", "json": "" }, "customConditional": "", "logic": [], "attributes": {}, "overlay": { "style": "", "page": "", "left": "", "top": "", "width": "", "height": "" }, "type": "textfield", "input": true, "refreshOn": "", "inputType": "text", "id": "evs36u", "defaultValue": "" }, { "label": "Category", "labelPosition": "top", "placeholder": "", "description": "", "tooltip": "", "prefix": "", "suffix": "", "widget": { "type": "input" }, "inputMask": "", "allowMultipleMasks": false, "customClass": "", "tabindex": "", "hidden": false, "hideLabel": false, "showWordCount": false, "showCharCount": false, "mask": false, "autofocus": false, "spellcheck": true, "disabled": false, "tableView": true, "modalEdit": false, "multiple": false, "persistent": true, "inputFormat": "plain", "protected": false, "dbIndex": false, "case": "", "encrypted": false, "redrawOn": "", "clearOnHide": true, "customDefaultValue": "", "calculateValue": "", "calculateServer": false, "allowCalculateOverride": false, "validateOn": "change", "validate": { "required": false, "pattern": "", "customMessage": "", "custom": "", "customPrivate": false, "json": "", "minLength": "", "maxLength": "", "strictDateValidation": false, "multiple": false, "unique": false }, "unique": false, "errorLabel": "", "key": "category", "tags": [], "properties": {}, "conditional": { "show": null, "when": null, "eq": "", "json": "" }, "customConditional": "", "logic": [], "attributes": {}, "overlay": { "style": "", "page": "", "left": "", "top": "", "width": "", "height": "" }, "type": "textfield", "input": true, "refreshOn": "", "inputType": "text", "id": "eot99e", "defaultValue": "" }, { "label": "Cancel", "showValidations": false, "theme": "danger", "size": "md", "block": false, "leftIcon": "", "rightIcon": "", "shortcut": "", "description": "", "tooltip": "", "customClass": "", "tabindex": "", "disableOnInvalid": false, "hidden": false, "autofocus": false, "disabled": false, "tableView": false, "modalEdit": false, "key": "cancel", "tags": [], "properties": {}, "conditional": { "show": null, "when": null, "eq": "", "json": "" }, "customConditional": "", "logic": [], "attributes": {}, "overlay": { "style": "", "page": "", "left": "", "top": "", "width": "", "height": "" }, "type": "button", "action": "event", "input": true, "placeholder": "", "prefix": "", "suffix": "", "multiple": false, "defaultValue": null, "protected": false, "unique": false, "persistent": false, "clearOnHide": true, "refreshOn": "", "redrawOn": "", "labelPosition": "top", "errorLabel": "", "hideLabel": false, "dbIndex": false, "customDefaultValue": "", "calculateValue": "", "widget": { "type": "input" }, "validateOn": "change", "validate": { "required": false, "custom": "", "customPrivate": false, "strictDateValidation": false, "multiple": false, "unique": false }, "allowCalculateOverride         const flattenContainerTypes = [
            'bootstrapComponent',
            'topnavigation',
            'breadcrumbs',
            'sidemenu',
            'edgeframe',
            'modal',
            'card'
        ];

        const toContentComponent = (component) => {
            const title = component.title || component.label || '';
            const html = component.html || component.content || component.value || (title ? '<h2 style="text-align:center;margin:0 0 16px;">' + title + '</h2>' : '');
            return {
                type: 'content',
                key: component.key || ('content_' + Math.random().toString(36).slice(2, 8)),
                html: html,
                input: false
            };
        };

        const normalizeList = (list) => {
            if (!Array.isArray(list)) return [];
            return list.reduce((acc, component) => {
                const normalized = normalizeComponent(component);
                return acc.concat(normalized);
            }, []);
        };

        const normalizeComponent = (component) => {
            if (!component || typeof component !== 'object') return [];
            const next = { ...component };

            if (Array.isArray(next.components)) {
                next.components = normalizeList(next.components);
            }

            if (Array.isArray(next.columns)) {
                next.columns = next.columns.map((column) => ({
                    ...column,
                    components: normalizeList(column.components || [])
                }));
            }

            if (Array.isArray(next.rows)) {
                next.rows = next.rows.map((row) =>
                    (Array.isArray(row) ? row : []).map((cell) => ({
                        ...cell,
                        components: normalizeList(cell.components || [])
                    }))
                );
            }

            if (Array.isArray(next.tabs)) {
                next.tabs = next.tabs.map((tab) => ({
                    ...tab,
                    components: normalizeList(tab.components || [])
                }));
            }

            if (next.type === 'typography' || next.type === 'htmlelement') {
                return [toContentComponent(next)];
            }

            if (next.type === 'divcomponent') {
                return next.components || [];
            }

            if (flattenContainerTypes.indexOf(next.type) !== -1) {
                return next.components || [];
            }

            return [next];
        };

        const schema = {
            ...sourceSchema,
            components: normalizeList(sourceSchema.components || [])
        };

        Formio.createForm(document.getElementById('glozic-form'), schema, {
            noAlerts: true
        });
    </script>
</body>

</html>
